[core]
    editor = vim
    autocrlf = input
    whitespace = fix

    excludesfile = ~/.gitignore_global

[color]
    ui = auto

[diff]
    algorithm = histogram
    colorMoved = default
    mnemonicPrefix = true
    renames = copies

[merge]
    conflictstyle = diff3

[push]
    default = simple
    autoSetupRemote = true
    followTags = true

[pull]
    rebase = true

[fetch]
    prune = true
    autoGC = true

[rerere]
    enabled = true

[init]
    defaultBranch = main

[log]
    date = iso8601
