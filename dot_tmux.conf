# ── 基础 ──────────────────────────────────────────────────

# TERM 设置说明：
#   tmux-256color 是 tmux 官方推荐值，Ubuntu 和 WSL2 均自带此 terminfo。
#   如果遇到奇怪的显示问题（斜体乱码、ncurses 报错），先跑：
#     infocmp tmux-256color
#   若缺失则装 ncurses-term 包：sudo apt install ncurses-term
#   terminal-overrides 让外层终端（通常是 xterm-256color）启用 24-bit RGB。
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g base-index 1              # 窗口编号从 1 开始（0 离左手太远）
setw -g pane-base-index 1        # 窗格编号也从 1 开始，与窗口一致
set -g renumber-windows on       # 关闭窗口后自动重新编号，避免出现空洞

# escape-time 0：取消 Esc 延迟，vim/nvim 模式切换瞬间响应
# repeat-time 300ms：连续按键窗口，超时后恢复普通按键
set -s escape-time 0
set -g repeat-time 300

# 滚动缓冲区 1 万行（默认 2000 太少，5 万会拖慢 resurrect 保存）
set -g history-limit 10000

set -g mouse on                  # 鼠标点击切换窗格、拖拽调整大小、滚轮翻页

# ── 剪贴板 ────────────────────────────────────────────────

set -g set-clipboard on          # OSC 52 系统剪贴板（SSH 远程也能用）

# 速记（复制/粘贴行为边界）：
# 1) Ctrl+Shift+V / 终端右键粘贴：本地终端行为，直接把“本机”剪贴板内容发进当前会话。
# 2) tmux 右键（MouseDown3Pane）：tmux 在“当前主机”执行 @paste-tool 读剪贴板；失败回退 tmux buffer。
# 3) 本机 Ubuntu/WSL2 图形会话：@paste-tool 可读系统剪贴板；tmux 复制也会尝试 OSC52 回传。
# 4) SSH 登录到远程再进 tmux（即使你本地是 tty）：远程 tmux 不能直接读你本地剪贴板，
#    但你仍可用 Ctrl+Shift+V（本地终端粘贴）；远程 tmux 复制是否回传取决于本地终端对 OSC52 的支持。

# 确保客户端的 WAYLAND_DISPLAY / WSL_DISTRO_NAME 同步到服务端
# DISPLAY 已在 tmux 默认 update-environment 中，无需重复添加
set -ag update-environment "WAYLAND_DISPLAY"
set -ag update-environment "WSL_DISTRO_NAME"
set -ag update-environment "TERM_PROGRAM"

# 启动时捕获外层终端类型（tmux 启动后 $TERM_PROGRAM 会被覆盖为 "tmux"，
# 但服务器进程环境在 run 执行时仍保留外层终端的值）
run 'tmux set -g @outer-term "$TERM_PROGRAM"'

# 剪贴板工具检测：Wayland → WSL(UTF-8) → X11 → 无(仅靠 OSC 52)
# WSL 用 PowerShell 确保 UTF-8，clip.exe 默认 codepage 会导致中文乱码
run 'if [ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null; then tmux set -g @clipboard-tool "wl-copy"; elif [ -n "$WSL_DISTRO_NAME" ] && command -v powershell.exe >/dev/null; then tmux set -g @clipboard-tool "powershell.exe -NoProfile -Command [Console]::InputEncoding=[System.Text.Encoding]::UTF8;\\$input|Set-Clipboard"; elif [ -n "$DISPLAY" ] && command -v xclip >/dev/null; then tmux set -g @clipboard-tool "xclip -sel clip"; else tmux set -g @clipboard-tool ""; fi'

# 粘贴工具检测（反向：系统剪贴板 → tmux）
# WSL2 的 wl-paste 需要指定 XDG_RUNTIME_DIR=/mnt/wslg/runtime-dir
run 'if [ -n "$WAYLAND_DISPLAY" ] && command -v wl-paste >/dev/null; then if [ -n "$WSL_DISTRO_NAME" ] && [ -d /mnt/wslg/runtime-dir ]; then tmux set -g @paste-tool "XDG_RUNTIME_DIR=/mnt/wslg/runtime-dir wl-paste --no-newline"; else tmux set -g @paste-tool "wl-paste --no-newline"; fi; elif [ -n "$WSL_DISTRO_NAME" ] && command -v powershell.exe >/dev/null; then tmux set -g @paste-tool "powershell.exe -NoProfile -Command Get-Clipboard"; elif [ -n "$DISPLAY" ] && command -v xclip >/dev/null; then tmux set -g @paste-tool "xclip -selection clipboard -o"; else tmux set -g @paste-tool ""; fi'

# 客户端附加时重新检测剪贴板工具（服务端可能在 tty 下启动，但客户端有图形环境）
set-hook -g client-attached 'run "if [ -n \"$WAYLAND_DISPLAY\" ] && command -v wl-paste >/dev/null; then if [ -n \"$WSL_DISTRO_NAME\" ] && [ -d /mnt/wslg/runtime-dir ]; then tmux set -g @paste-tool \"XDG_RUNTIME_DIR=/mnt/wslg/runtime-dir wl-paste --no-newline\"; tmux set -g @clipboard-tool \"wl-copy\"; else tmux set -g @paste-tool \"wl-paste --no-newline\"; tmux set -g @clipboard-tool \"wl-copy\"; fi; elif [ -n \"$WSL_DISTRO_NAME\" ] && command -v powershell.exe >/dev/null; then tmux set -g @paste-tool \"powershell.exe -NoProfile -Command Get-Clipboard\"; tmux set -g @clipboard-tool \"powershell.exe -NoProfile -Command [Console]::InputEncoding=[System.Text.Encoding]::UTF8;\\$input|Set-Clipboard\"; elif [ -n \"$DISPLAY\" ] && command -v xclip >/dev/null; then tmux set -g @paste-tool \"xclip -selection clipboard -o\"; tmux set -g @clipboard-tool \"xclip -sel clip\"; else tmux set -g @paste-tool \"\"; tmux set -g @clipboard-tool \"\"; fi"'

# copy-pipe 兜底（GNOME Terminal 等不支持 OSC 52 的终端）
# 支持 OSC 52 的终端会同时通过 set-clipboard on 写入系统剪贴板
bind -T copy-mode-vi MouseDragEnd1Pane if-shell 'test -n "#{@clipboard-tool}"' 'send -X copy-pipe-and-cancel "#{@clipboard-tool}"' 'send -X copy-selection-and-cancel'

# ── 外观 ──────────────────────────────────────────────────

# 状态栏
set -g status-style "bg=#333333,fg=#aaaaaa"
set -g status-left-length 30
set -g status-left '#[fg=#88c0d0,bold] #S #{prefix_highlight}'
# 右侧：缓冲区已用/最大(橙色) + 时间日期(绿色)，每15秒刷新
set -g status-right '#[fg=#d08770]#(~/.tmux/scripts/tmux-mem.sh) #[fg=#a3be8c]%H:%M  %Y-%m-%d '

# 窗口标签
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#2e3440,bg=#88c0d0,bold] #I:#W '

# 窗格边框
set -g pane-border-style "fg=#4c566a"
set -g pane-active-border-style "fg=#88c0d0"

# ── 导航与分屏 ────────────────────────────────────────────

# 分屏时保持当前目录
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# Vim 风格窗格导航由 vim-tmux-navigator 插件智能处理
# （在 nvim 内由 nvim 处理，在普通窗格由 tmux 处理）
set -g @is_vim 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(\S+/)?g?(view|l?n?vim?x?)(diff)?$"'
bind -n C-h if-shell "#{@is_vim}" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "#{@is_vim}" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "#{@is_vim}" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "#{@is_vim}" "send-keys C-l" "select-pane -R"

# ── Vi 复制模式 ───────────────────────────────────────────

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y if-shell 'test -n "#{@clipboard-tool}"' 'send -X copy-pipe-and-cancel "#{@clipboard-tool}"' 'send -X copy-selection-and-cancel'
bind -T copy-mode-vi h send -X cursor-left
bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi k send -X cursor-up
bind -T copy-mode-vi l send -X cursor-right

# ── 快捷键 ────────────────────────────────────────────────

# 快速重载配置
bind r source-file ~/.tmux.conf \; display-message "配置已重载"
# prefix + C: 清理当前窗格历史缓冲区（tmux卡顿时用）
bind C clear-history \; display-message "已清理当前窗格历史"

# ── 插件 (TPM) ───────────────────────────────────────────
# 首次使用: 按 prefix + I 安装插件
# 更新插件:  按 prefix + U
# 卸载插件:  按 prefix + alt+u
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

set -g @resurrect-capture-pane-contents 'off'  # 关闭：抓取窗格内容会按 history-limit 序列化，窗口多时极卡
set -g @resurrect-processes 'nvim claude'       # 恢复时自动重启这些进程
set -g @continuum-save-interval '0'             # 关闭自动保存，手动 prefix+Ctrl-s 保存
set -g @continuum-restore 'off'                 # 关闭自动恢复，需要时手动 prefix+Ctrl-r

# TPM 未安装时显示安装提示
if-shell 'test ! -d ~/.tmux/plugins/tpm' 'display-message "TPM 未安装! git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm"'

# TPM 初始化（保持在这行最后）
run '~/.tmux/plugins/tpm/tpm'

# ── 右键粘贴（必须在 TPM 之后，否则被插件默认菜单覆盖）──
# VSCode / Cursor 终端自带右键粘贴（rightClickBehavior），tmux 再绑会粘贴两次；
# 在类 VSCode 终端里跳过 tmux 粘贴，让编辑器自己处理；其他终端照常走 tmux。
bind -n MouseDown3Pane run 'outer_term="$(tmux show -gv @outer-term 2>/dev/null)"; if [ "$outer_term" != "vscode" ] && [ "$outer_term" != "cursor" ]; then tool="$(tmux show -gv @paste-tool 2>/dev/null)"; if [ -n "$tool" ] && eval "$tool" | tmux load-buffer -; then tmux paste-buffer -p; else tmux paste-buffer; fi; fi'
